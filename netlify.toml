# Netlifyデプロイ設定（静的SPA）
# 環境変数 VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY は
# Netlifyダッシュボード（Site settings → Environment variables）で設定する。

[build]
  command = "npm run build"
  publish = "dist"

# SPAのためすべてのパスをindex.htmlへ（現状ルーティングは無いが将来対応）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
